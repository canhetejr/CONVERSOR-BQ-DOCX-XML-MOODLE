<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Moodle XML para DOCX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca para gerar DOCX no navegador (Versão estável) -->
    <script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js"></script>
    <!-- Biblioteca para salvar o ficheiro -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .drag-active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        /* Personalização da barra de rolagem para mensagens */
        #logArea::-webkit-scrollbar { width: 6px; }
        #logArea::-webkit-scrollbar-track { background: transparent; }
        #logArea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans p-4 md:p-8 flex items-center justify-center">

    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <!-- Cabeçalho -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>
                Conversor Moodle para DOCX
            </h1>
            <p class="text-blue-100 mt-2 text-sm">Transforme os seus bancos de questões XML em documentos formatados para impressão.</p>
        </div>

        <div class="p-6 md:p-8 space-y-6">
            
            <!-- Área de Carregamento -->
            <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer transition-colors hover:border-blue-400 hover:bg-gray-50 relative">
                <input type="file" id="fileInput" accept=".xml" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                
                <div class="pointer-events-none">
                    <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                    <p class="text-lg font-medium text-gray-700" id="fileLabel">Arraste o seu ficheiro .xml para aqui</p>
                    <p class="text-sm text-gray-500 mt-1">ou clique para selecionar do computador</p>
                </div>
            </div>

            <!-- Configurações -->
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <h3 class="font-medium text-gray-700 mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Opções do Documento
                </h3>
                <div class="space-y-2">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="chkGabarito" checked class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="text-gray-700">Incluir gabarito no final do documento</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="chkBoldCorrect" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                        <span class="text-gray-700">Destacar resposta correta a <b>negrito</b> nas alternativas</span>
                    </label>
                </div>
            </div>

            <!-- Mensagens/Logs -->
            <div id="logArea" class="hidden transition-all duration-300">
                <div class="bg-blue-50 text-blue-800 text-sm p-3 rounded-lg flex items-center justify-between shadow-sm">
                    <span id="statusMessage">Aguardar ficheiro...</span>
                </div>
            </div>

            <!-- Botão de Ação -->
            <button id="convertBtn" disabled class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-xl shadow-sm transition-colors flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Gerar e Transferir DOCX
            </button>
        </div>
    </div>

    <script>
        // Elementos do DOM
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const convertBtn = document.getElementById('convertBtn');
        const logArea = document.getElementById('logArea');
        const chkGabarito = document.getElementById('chkGabarito');
        const chkBoldCorrect = document.getElementById('chkBoldCorrect');

        let selectedFile = null;

        // Limpa o texto, removendo tags HTML indesejadas e corrigindo entidades
        function cleanText(htmlString) {
            if (!htmlString) return "";
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlString;
            return tempDiv.textContent || tempDiv.innerText || "";
        }

        // Mostra mensagens na interface
        function showMessage(msg, type = 'info') {
            logArea.classList.remove('hidden');
            const bgClass = type === 'error' ? 'bg-red-50 text-red-800 border border-red-200' : (type === 'success' ? 'bg-green-50 text-green-800 border border-green-200' : 'bg-blue-50 text-blue-800 border border-blue-200');
            logArea.innerHTML = `<div class="${bgClass} text-sm p-3 rounded-lg shadow-sm">${msg}</div>`;
        }

        // Lida com o ficheiro selecionado
        function handleFile(file) {
            if (file && file.name.endsWith('.xml')) {
                selectedFile = file;
                fileLabel.innerHTML = `Ficheiro selecionado: <span class="font-semibold text-blue-600">${file.name}</span>`;
                convertBtn.disabled = false;
                showMessage("Ficheiro carregado. Escolha as opções e clique em Gerar para converter.", "info");
            } else {
                selectedFile = null;
                fileLabel.textContent = "Por favor, selecione um ficheiro XML válido.";
                convertBtn.disabled = true;
                showMessage("Ficheiro inválido. Apenas extensão .xml é suportada.", "error");
            }
        }

        // Eventos de Arrastar e Largar (Drag and Drop)
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => dropzone.classList.add('drag-active'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => dropzone.classList.remove('drag-active'), false);
        });

        dropzone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFile(files[0]);
            fileInput.files = files; // Sincroniza o input
        });

        fileInput.addEventListener('change', function(e) {
            handleFile(this.files[0]);
        });

        // Lógica de Leitura XML e Geração do DOCX
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // Bloqueia o botão durante o processamento
            convertBtn.disabled = true;
            convertBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> A processar...`;

            try {
                const text = await selectedFile.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                
                // Extrai as questões do XML
                const questionNodes = xmlDoc.querySelectorAll("question:not([type='category'])");
                
                if (questionNodes.length === 0) {
                    throw new Error("Nenhuma questão foi encontrada no ficheiro XML do Moodle.");
                }

                const parsedQuestions = [];

                questionNodes.forEach((node, index) => {
                    const qType = node.getAttribute("type");
                    
                    // Extrair texto da questão
                    const qTextNode = node.querySelector("questiontext > text");
                    const rawQText = qTextNode ? qTextNode.textContent : "";
                    const cleanQText = cleanText(rawQText).trim();

                    // Extrair alternativas/respostas
                    const answers = [];
                    const answerNodes = node.querySelectorAll("answer");
                    
                    answerNodes.forEach(ansNode => {
                        const fraction = parseFloat(ansNode.getAttribute("fraction") || "0");
                        // Se a fração for maior que 0, consideramos como a resposta correta (ou parte dela)
                        const isCorrect = fraction > 0; 
                        
                        const ansTextNode = ansNode.querySelector("text");
                        const rawAnsText = ansTextNode ? ansTextNode.textContent : "";
                        const cleanAnsText = cleanText(rawAnsText).trim();

                        if (cleanAnsText) {
                            answers.push({
                                text: cleanAnsText,
                                isCorrect: isCorrect
                            });
                        }
                    });

                    // Só adiciona a questão se tiver um enunciado
                    if (cleanQText) {
                        parsedQuestions.push({
                            number: index + 1,
                            type: qType,
                            text: cleanQText,
                            answers: answers
                        });
                    }
                });

                // Inicia a geração do documento
                generateDocx(parsedQuestions);

            } catch (error) {
                console.error(error);
                showMessage(`Erro ao processar: ${error.message}`, "error");
                resetBtn();
            }
        });

        // Função que utiliza a biblioteca docx.js para criar o ficheiro e transferir
        function generateDocx(questions) {
            // Verifica se a biblioteca carregou
            if (typeof window.docx === 'undefined') {
                showMessage("Erro: A biblioteca DOCX não carregou corretamente. Verifique a sua ligação à internet e recarregue a página.", "error");
                resetBtn();
                return;
            }

            const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType } = window.docx;

            const docChildren = [];
            const gabaritoInfo = [];

            // Título Principal
            docChildren.push(new Paragraph({
                text: "Banco de Questões",
                heading: HeadingLevel.TITLE,
                alignment: AlignmentType.CENTER,
                spacing: { after: 400 }
            }));

            const optionsLabels = ['a)', 'b)', 'c)', 'd)', 'e)', 'f)', 'g)', 'h)'];

            questions.forEach((q, qIndex) => {
                const questaoNumero = qIndex + 1;
                
                // Título da "Questão X"
                docChildren.push(new Paragraph({
                    children: [new TextRun({ text: `Questão ${questaoNumero}`, bold: true, size: 24 })],
                    spacing: { before: 400, after: 120 }
                }));

                // Texto da questão (dividindo por quebras de linha para manter os parágrafos corretos)
                const paragraphs = q.text.split('\n');
                paragraphs.forEach(pText => {
                    if (pText.trim()) {
                        docChildren.push(new Paragraph({
                            children: [new TextRun({ text: pText.trim(), size: 22 })],
                            spacing: { after: 120 },
                            alignment: AlignmentType.JUSTIFIED
                        }));
                    }
                });

                // Alternativas
                q.answers.forEach((ans, aIndex) => {
                    const label = optionsLabels[aIndex] || '-)';
                    
                    let isBold = chkBoldCorrect.checked && ans.isCorrect;

                    docChildren.push(new Paragraph({
                        children: [
                            new TextRun({ text: `${label} `, bold: isBold, size: 22 }),
                            new TextRun({ text: ans.text, bold: isBold, size: 22 })
                        ],
                        indent: { left: 720 }, // Recuo de mais ou menos 0.5 polegada
                        spacing: { after: 80 }
                    }));

                    // Guardar para o Gabarito (caso seja a correta)
                    if (ans.isCorrect) {
                        gabaritoInfo.push(`Q${questaoNumero}: ${label.replace(')', '').toUpperCase()}`);
                    }
                });
            });

            // Adicionar Gabarito no final, se o utilizador selecionou a opção
            if (chkGabarito.checked && gabaritoInfo.length > 0) {
                docChildren.push(new Paragraph({
                    text: "Gabarito",
                    heading: HeadingLevel.HEADING_1,
                    spacing: { before: 800, after: 200 }
                }));

                // Agrupar as respostas de 5 em 5 na mesma linha
                let gabaritoText = "";
                for (let i = 0; i < gabaritoInfo.length; i++) {
                    gabaritoText += gabaritoInfo[i].padEnd(10, ' ');
                    if ((i + 1) % 5 === 0) gabaritoText += "\n";
                }

                const gabLines = gabaritoText.split('\n');
                gabLines.forEach(line => {
                    if (line.trim()) {
                        docChildren.push(new Paragraph({
                            children: [new TextRun({ text: line, size: 22 })],
                        }));
                    }
                });
            }

            // Configurar Documento
            const doc = new Document({
                creator: "Conversor Moodle para DOCX",
                description: "Avaliação exportada e formatada",
                sections: [{
                    properties: {},
                    children: docChildren
                }]
            });

            // Compilar ficheiro e gerar transferência (usando Blob)
            Packer.toBlob(doc).then(blob => {
                const originalName = selectedFile.name.replace('.xml', '');
                window.saveAs(blob, `${originalName}_Formatado.docx`);
                
                showMessage("Documento gerado e transferido com sucesso!", "success");
                resetBtn();
            }).catch(err => {
                console.error(err);
                showMessage("Erro ao compilar o ficheiro DOCX. Verifique a consola.", "error");
                resetBtn();
            });
        }

        // Repor o estado do botão para o inicial
        function resetBtn() {
            convertBtn.disabled = false;
            convertBtn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Gerar e Transferir DOCX
            `;
        }
    </script>
</body>
</html>
